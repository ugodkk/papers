<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Notas Pro - Seu Jornal Pessoal Digital">
    <meta name="theme-color" content="#2c1810">
    <title>Notas Pro - Seu Jornal Pessoal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Playfair+Display:wght@400;700;900&family=EB+Garamond:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📰</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --paper-light: #faf8f3;
            --paper-dark: #f5f1e8;
            --paper-darker: #ebe5d9;
            --gold-primary: #d4af37;
            --gold-dark: #a68a4a;
            --text-primary: #2c1810;
            --text-secondary: #5c3a1f;
            --text-muted: #6b4423;
            --bg-overlay: linear-gradient(135deg, #D4AF37 0%, #B8A130 50%, #8B7E1A 100%);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'EB Garamond', Georgia, serif;
            background: var(--bg-overlay);
            color: var(--text-primary);
            line-height: 1.8;
            min-height: 100vh;
        }

        .newspaper-page {
            max-width: 1400px;
            margin: 20px auto;
            background: linear-gradient(to bottom, var(--paper-light) 0%, var(--paper-dark) 50%, var(--paper-darker) 100%);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .newspaper-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px),
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.01) 1px, rgba(0,0,0,0.01) 2px);
            pointer-events: none;
            z-index: 1;
        }

        .newspaper-content {
            position: relative;
            z-index: 2;
            padding: 60px;
        }

        .newspaper-masthead {
            text-align: center;
            border-bottom: 3px solid var(--text-primary);
            border-top: 3px solid var(--text-primary);
            padding: 40px 0;
            margin-bottom: 40px;
        }

        .masthead-title {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-primary);
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
            margin-bottom: 5px;
        }

        .masthead-subtitle {
            font-family: 'Crimson Text', serif;
            font-size: 1.3rem;
            font-style: italic;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .masthead-date {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid var(--text-primary);
            border-bottom: 1px solid var(--text-primary);
            padding: 8px 0;
            font-weight: 600;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            border-bottom: 2px solid var(--text-primary);
            margin-bottom: 40px;
        }

        .nav-tab {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 15px 35px;
            font-size: 1.05rem;
            font-family: 'EB Garamond', serif;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background: rgba(212, 175, 55, 0.1);
        }

        .nav-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--text-primary);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .article-form {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid var(--gold-dark);
            padding: 40px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px 15px;
            font-family: 'EB Garamond', serif;
            font-size: 1rem;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--gold-dark);
            border-radius: 0;
            line-height: 1.8;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            background: white;
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .form-textarea {
            resize: vertical;
            min-height: 350px;
            font-size: 1.05rem;
        }

        .editor-toolbar {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold-dark);
        }

        .toolbar-btn {
            background: white;
            border: 1px solid var(--gold-dark);
            padding: 8px 12px;
            cursor: pointer;
            font-family: serif;
            font-weight: 700;
            transition: all 0.3s;
        }

        .toolbar-btn:hover {
            background: var(--gold-primary);
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn {
            padding: 13px 28px;
            font-family: 'EB Garamond', serif;
            font-size: 1rem;
            font-weight: 700;
            border: 2px solid var(--text-primary);
            background: white;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--text-primary);
            color: white;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--text-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--gold-primary);
            border-color: var(--gold-primary);
            color: var(--text-primary);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 25px;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--gold-dark);
            margin-bottom: 35px;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .journal-columns {
            column-count: 2;
            column-gap: 50px;
            column-rule: 2px solid var(--gold-dark);
            text-align: justify;
        }

        .article {
            break-inside: avoid;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--gold-dark);
            animation: fadeIn 0.5s ease-out;
        }

        .article:last-child {
            border-bottom: none;
        }

        .article-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            line-height: 1.3;
            letter-spacing: 1px;
        }

        .article-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-align: right;
        }

        .article-content {
            font-size: 0.98rem;
            line-height: 1.95;
            color: var(--text-primary);
            text-align: justify;
        }

        .article-content p {
            margin-bottom: 12px;
            text-indent: 2em;
        }

        .article-content p:first-child {
            text-indent: 0;
        }

        .article-tags {
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag {
            display: inline-block;
            background: var(--gold-dark);
            color: white;
            padding: 3px 8px;
            margin-right: 5px;
            border-radius: 0;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            font-size: 1.2rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .newspaper-footer {
            text-align: center;
            border-top: 3px solid var(--text-primary);
            padding: 30px 0;
            margin-top: 50px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .footer-decoration {
            font-size: 1.3rem;
            letter-spacing: 3px;
            margin: 15px 0;
            color: var(--gold-dark);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--paper-light);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-dark);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-primary);
        }

        @media (max-width: 1024px) {
            .newspaper-content {
                padding: 40px;
            }
            .masthead-title {
                font-size: 3rem;
            }
            .journal-columns {
                column-count: 1;
                column-gap: 0;
                column-rule: none;
            }
        }

        @media (max-width: 768px) {
            .newspaper-content {
                padding: 25px 15px;
            }
            .newspaper-masthead {
                padding: 25px 0;
                margin-bottom: 25px;
            }
            .masthead-title {
                font-size: 2rem;
                letter-spacing: 2px;
            }
            .masthead-subtitle {
                font-size: 1rem;
            }
            .nav-tabs {
                flex-wrap: wrap;
            }
            .nav-tab {
                padding: 12px 20px;
                font-size: 1rem;
            }
            .article-form {
                padding: 25px;
            }
            .form-textarea {
                min-height: 250px;
            }
            .stats-bar {
                flex-wrap: wrap;
                gap: 15px;
            }
            .action-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
            .article-title {
                font-size: 1.5rem;
            }
            .article-content {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="newspaper-page">
        <div class="newspaper-content">
            <div class="newspaper-masthead">
                <div class="masthead-title">Notas Pro</div>
                <div class="masthead-subtitle">Seu Jornal Pessoal de Notas</div>
                <div style="text-align: center; margin: 15px 0; font-size: 1.5rem; letter-spacing: 3px; color: var(--gold-dark);">✦ ✦ ✦</div>
                <div class="masthead-date" id="todayDate"></div>
            </div>

            <div class="nav-tabs">
                <button class="nav-tab active" data-section="editor">✍️ EDITAR NOTA</button>
                <button class="nav-tab" data-section="journal">📰 JORNAL</button>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-number" id="totalNotes">0</div>
                    <div class="stat-label">Notas Publicadas</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalChars">0</div>
                    <div class="stat-label">Caracteres</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="lastUpdated">—</div>
                    <div class="stat-label">Última Atualização</div>
                </div>
            </div>

            <div class="section active" id="editorSection">
                <form class="article-form" id="noteForm">
                    <div class="form-group">
                        <label class="form-label">Título do Artigo</label>
                        <input type="text" id="noteTitle" class="form-input" placeholder="Digite o título da sua nota..." required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Conteúdo</label>
                        <div class="editor-toolbar">
                            <button type="button" class="toolbar-btn" data-cmd="bold">B</button>
                            <button type="button" class="toolbar-btn" data-cmd="italic">I</button>
                            <button type="button" class="toolbar-btn" data-cmd="insertUnorderedList">•</button>
                        </div>
                        <textarea id="noteContent" class="form-textarea" placeholder="Escreva seu artigo aqui..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Tags (separadas por vírgula)</label>
                        <input type="text" id="noteTags" class="form-input" placeholder="ex: Política, Economia, Cultura">
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn btn-primary">📤 PUBLICAR NO JORNAL</button>
                        <button type="button" class="btn" id="clearBtn">LIMPAR</button>
                        <button type="button" class="btn" id="previewBtn">👁️ PREVIEW</button>
                    </div>
                </form>
            </div>

            <div class="section" id="journalSection">
                <div class="journal-columns" id="journalContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">📰</div>
                        <p>Nenhuma nota publicada ainda.</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">Crie e publique suas notas no editor.</p>
                    </div>
                </div>
            </div>

            <div class="newspaper-footer">
                <div class="footer-decoration">✦ ✦ ✦</div>
                <p>Publicado por Notas Pro - Seu Jornal Digital Pessoal</p>
                <p style="margin-top: 8px; font-size: 0.85rem;">Um espaço elegante para suas reflexões</p>
            </div>
        </div>
    </div>

    <script src="newspaper.js"></script>
    <script>
        let notes = [];
        const noteForm = document.getElementById('noteForm');
        const noteTitle = document.getElementById('noteTitle');
        const noteContent = document.getElementById('noteContent');
        const noteTags = document.getElementById('noteTags');
        const journalContainer = document.getElementById('journalContainer');
        const clearBtn = document.getElementById('clearBtn');
        const previewBtn = document.getElementById('previewBtn');
        const editorSection = document.getElementById('editorSection');
        const journalSection = document.getElementById('journalSection');

        function updateDate() {
            const date = new Intl.DateTimeFormat('pt-BR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }).format(new Date());
            document.getElementById('todayDate').textContent = date.toUpperCase();
        }

        function formatDate(date) {
            return new Intl.DateTimeFormat('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            }).format(new Date(date));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStats() {
            const totalNotes = notes.length;
            const totalChars = notes.reduce((sum, note) => sum + (note.content || '').length, 0);
            document.getElementById('totalNotes').textContent = totalNotes;
            document.getElementById('totalChars').textContent = totalChars.toLocaleString('pt-BR');
            if (totalNotes > 0) {
                const lastNote = notes[notes.length - 1];
                document.getElementById('lastUpdated').textContent = formatDate(lastNote.date);
            }
        }

        function loadNotes() {
            try {
                notes = JSON.parse(localStorage.getItem('shared_notes') || '[]');
                renderJournal();
                updateStats();
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function renderJournal() {
            if (notes.length === 0) {
                journalContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📰</div><p>Nenhuma nota publicada ainda.</p></div>';
                return;
            }
            journalContainer.innerHTML = '';
            notes.forEach((note) => {
                const article = document.createElement('div');
                article.className = 'article';
                const tags = note.tags && note.tags.length > 0
                    ? `<div class="article-tags">${note.tags.map(tag => `<span class="tag">${escapeHtml(tag.trim())}</span>`).join('')}</div>`
                    : '';
                const content = escapeHtml(note.content || '').substring(0, 400) + (note.content.length > 400 ? '...' : '');
                article.innerHTML = `
                    <div class="article-title">${escapeHtml(note.title)}</div>
                    <div class="article-meta">Publicado em ${formatDate(note.date)}</div>
                    <div class="article-content"><p>${content.replace(/\n/g, '<br>')}</p></div>
                    ${tags}
                `;
                journalContainer.appendChild(article);
            });
        }

        noteForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newNote = {
                id: Date.now(),
                title: noteTitle.value.trim(),
                content: noteContent.value.trim(),
                tags: noteTags.value.split(',').filter(t => t.trim()),
                date: new Date().toISOString(),
                sharedAt: new Date().toISOString()
            };
            if (!newNote.title || !newNote.content) {
                alert('Preencha título e conteúdo');
                return;
            }
            notes.push(newNote);
            localStorage.setItem('shared_notes', JSON.stringify(notes));
            noteTitle.value = '';
            noteContent.value = '';
            noteTags.value = '';
            renderJournal();
            updateStats();
            alert('✅ Nota publicada!');
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('Limpar formulário?')) {
                noteTitle.value = '';
                noteContent.value = '';
                noteTags.value = '';
                noteTitle.focus();
            }
        });

        previewBtn.addEventListener('click', () => {
            alert(`TÍTULO: ${noteTitle.value || '(vazio)'}\n\nCONTEÚDO:\n${noteContent.value || '(vazio)'}\n\nTAGS: ${noteTags.value || '(nenhuma)'}`);
        });

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const section = tab.dataset.section;
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                editorSection.classList.toggle('active', section === 'editor');
                journalSection.classList.toggle('active', section === 'journal');
                if (section === 'journal') loadNotes();
            });
        });

        document.querySelectorAll('.toolbar-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (btn.dataset.cmd === 'insertUnorderedList') {
                    noteContent.value += '\n• ';
                }
                noteContent.focus();
            });
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                noteForm.dispatchEvent(new Event('submit'));
            }
        });

        updateDate();
        loadNotes();
        setInterval(() => {
            if (journalSection.classList.contains('active')) loadNotes();
        }, 5000);
    </script>
</body>
</html>
