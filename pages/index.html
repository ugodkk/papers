<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocos de Notas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark">
    <header>
        <h1>Bloco de Notas</h1>
        <button id="theme-toggle" aria-label="Alternar modo">🌙</button>
    </header>

    <main>
        <div id="editor" contenteditable="true" spellcheck="false" placeholder="Escreva suas notas aqui..."></div>
        <div class="buttons">
            <button id="save-btn">Salvar</button>
            <button id="copy-btn">Copiar</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
